# Example for Streamlit Community Cloud → App settings → Secrets.
# Paste TOML there (do not commit real keys to git).
#
# Flat keys (recommended):
# GROQ_API_KEY = "gsk_..."
# GROQ_MODEL = "llama-3.1-8b-instant"
#
# Optional Gemini (LLM_PROVIDER can be auto/groq/gemini):
# LLM_PROVIDER = "gemini"
# GEMINI_API_KEY = "..."
# GEMINI_MODEL = "gemini-1.5-flash"
#
# Or nested (also supported by the app bootstrap):
# [groq]
# api_key = "gsk_..."
# model = "llama-3.1-8b-instant"
#
# [gemini]
# api_key = "..."
# model = "gemini-1.5-flash"
#
# Optional Hugging Face hub token for gated embedding models:
# HUGGINGFACE_HUB_TOKEN = "hf_..."